<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Reyes Rice Supply | Login</title>

<link rel="stylesheet" href="/css/style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:linear-gradient(135deg,#e8f5e9,#f1f8f4);
font-family:Segoe UI, sans-serif;
}

.login-card{
width:380px;
background:white;
padding:35px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
text-align:center;
}

.login-logo img{
width:70px;
margin-bottom:10px;
}

.login-logo h1{
font-size:22px;
color:#2e7d32;
}

.login-logo p{
font-size:13px;
color:#6b7280;
}

.login-form input{
width:100%;
padding:12px;
margin-bottom:12px;
border-radius:6px;
border:1px solid #d1d5db;
}

.login-btn{
width:100%;
background:#2e7d32;
color:white;
border:none;
padding:12px;
border-radius:6px;
cursor:pointer;
}

.login-btn:hover{
background:#1b5e20;
}

.register-btn{
margin-top:10px;
width:100%;
background:#f3f4f6;
border:none;
padding:10px;
border-radius:6px;
cursor:pointer;
}

#errorBox{
color:#dc2626;
font-size:13px;
margin-bottom:8px;
}

/* MODAL */

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.4);
display:none;
justify-content:center;
align-items:center;
}

.modal-content{
background:white;
padding:30px;
border-radius:10px;
width:350px;
}

.modal-content input{
width:100%;
padding:10px;
margin-bottom:10px;
border:1px solid #ccc;
border-radius:6px;
}

</style>

</head>



<body>

<div class="login-card">

<div class="login-logo">

<img src="/img/rice-logo.png">

<h1>Reyes Rice Supply</h1>

<p>Inventory Management System</p>

</div>

<div id="errorBox"></div>

<form id="loginForm" class="login-form">

<input
type="text"
id="username"
placeholder="Username"
required
>

<input
type="password"
id="password"
placeholder="Password"
required
>

<button type="submit" class="login-btn">
Login
</button>

</form>

<button class="register-btn" onclick="openRegister()">
Create Staff Account
</button>

</div>



<!-- REGISTER MODAL -->

<div id="registerModal" class="modal">

<div class="modal-content">

<button type="button" id="registerBtn" class="register-btn">
  Create Staff Account
</button>

<form id="registerForm">

<input
type="text"
id="reg_fullname"
placeholder="Full Name"
required
>

<input
type="text"
id="reg_username"
placeholder="Username"
required
>

<input
type="password"
id="reg_password"
placeholder="Password"
required
>

<button class="login-btn" type="submit">
Register
</button>

<button
type="button"
class="register-btn"
onclick="closeRegister()">
Cancel
</button>

</form>

</div>

</div>

<script src="/js/auth.js"></script>

</body>
</html>
